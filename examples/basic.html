<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Panes — basic example</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="../dist/pane.css" />
    <style>
      body { font-family: system-ui; padding: 24px; background: #f3f3f3; }
      button.launch { padding: 8px 14px; margin-right: 8px; }
    </style>
  </head>
  <body>
    <h1>Panes demo</h1>
    <p>Run <code>npm run build</code> first so <code>dist/</code> exists.</p>
    <button class="launch" onclick="Panes.open('#notes', { title: 'Notes' })">Open Notes</button>
    <button class="launch" onclick="Panes.open('#timer', { title: 'Timer' })">Open Timer</button>

    <div id="notes" style="width:360px;height:220px">
      <div class="pane-title"></div>
      <button class="pane-close" aria-label="Close">&times;</button>
      <div class="pane-content">
        <p>Drag the titlebar. Resize any edge or corner. Try it on touch too.</p>
      </div>
    </div>

    <div id="timer" style="width:280px;height:180px">
      <div class="pane-title"></div>
      <button class="pane-close" aria-label="Close">&times;</button>
      <div class="pane-content">
        <p>Pretend there's a timer here.</p>
      </div>
    </div>

    <script src="../dist/panes.global.js"></script>
  </body>
</html>
