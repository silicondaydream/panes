name: Deploy demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Assemble site
        run: |
          mkdir -p site/dist
          cp examples/index.html site/index.html
          cp examples/robots.txt site/robots.txt
          cp examples/sitemap.xml site/sitemap.xml
          cp examples/humans.txt site/humans.txt
          cp examples/og.svg site/og.svg
          cp llms.txt site/llms.txt
          cp dist/pane.css dist/panes.global.js site/dist/
          # Defensive: disable Jekyll processing (preserves files starting with _, .well-known, etc.)
          touch site/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
